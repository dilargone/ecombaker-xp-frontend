upstream backend_upstream {
    server 127.0.0.1:8080;
    keepalive 64;
}

server {
    listen 80;
    server_name .stage.ecombaker.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name ~^(?<tenant>[a-z0-9-]+)\.stage\.ecombaker\.com$;

    ssl_certificate /etc/letsencrypt/live/stage.ecombaker.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stage.ecombaker.com/privkey.pem;

    root /var/www/ecombaker-frontend;
    index index.html;

    location ^~ /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Tenant-Subdomain $tenant;
        proxy_set_header X-Original-Host $host;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
}
