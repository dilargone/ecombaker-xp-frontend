name: Deploy to Stage

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: stage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        # Mirage is auto-disabled because MODE=production in vite build

      - name: Deploy dist to frontend droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FRONTEND_DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "dist/"
          target: "/var/www/ecombaker-frontend"
          strip_components: 1
          rm: true

      - name: Setup nginx and reload
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FRONTEND_DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e

            # Install nginx if not present
            if ! command -v nginx &> /dev/null; then
              apt-get update -qq && apt-get install -y nginx
            fi

            # Always write nginx config (ensures correct config on every deploy)
            cat > /etc/nginx/conf.d/ecombaker-frontend.conf << 'NGINXCONF'
            server {
                listen 80 default_server;
                server_name _;

                root /var/www/ecombaker-frontend;
                index index.html;

                location = /healthz {
                    access_log off;
                    return 200 "ok\n";
                    add_header Content-Type text/plain;
                }

                # API requests are NOT proxied here — the upstream reverse proxy
                # (nginx-ecombaker) routes /api/ to the backend before hitting this server.

                location / {
                    try_files $uri $uri/ /index.html =404;
                }
            }
            NGINXCONF
            # Remove default site if present
            rm -f /etc/nginx/sites-enabled/default

            nginx -t
            systemctl enable nginx
            systemctl restart nginx
            echo "Nginx running OK"

      - name: Smoke test
        run: |
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.FRONTEND_DROPLET_HOST }}/healthz)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed — got $STATUS"
            exit 1
          fi
          echo "Deployment verified"
