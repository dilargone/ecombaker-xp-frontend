gname: Deploy to Stage

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: stage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        # Mirage is auto-disabled because MODE=production in vite build

      - name: Deploy dist to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "dist/"
          target: "/var/www/ecombaker-frontend"
          strip_components: 1
          rm: true

      - name: Smoke test
        run: |
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.DROPLET_HOST }}/)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed — got $STATUS"
            exit 1
          fi
          echo "Deployment verified"
